        // 1. Draw.io 공식 엔진(mxGraph) 초기화
        function initGraph() {
            const container = document.getElementById('graphContainer');
            if (graph) {
                graph.destroy(); // 화면 초기화
                originalStyles = {};
            }
            
            // mxGraph 인스턴스 생성
            graph = new mxGraph(container);
            
            // 뷰어 환경으로 잠금 (드래그, 연결 수정 방지)
            graph.setCellsLocked(true); 
            graph.setConnectable(false);
            graph.setTooltips(false);
            
            // 마우스 드래그로 도화지 이동 (Panning) 허용
            graph.setPanning(true); 
            const panner = new mxPanningHandler(graph);
            panner.useLeftButtonForPanning = true;
        }

        // 2. Draw.io XML 네이티브 파싱
        function renderDrawioXML(xmlString) {
            initGraph();
            
            try {
                // 수동 파싱 없이 mxGraph 자체 내장 디코더를 사용해 100% 똑같이 읽어들임
                const doc = mxUtils.parseXml(xmlString);
                const codec = new mxCodec(doc);
                const model = graph.getModel();
                
                model.beginUpdate();
                try {
                    model.clear();
                    codec.decode(doc.documentElement, model);
                } finally {
                    model.endUpdate();
                }

                // 나중에 원상복구를 위해 모든 요소(노드, 선)의 오리지널 CSS(스타일) 저장
                const cells = model.cells;
                for (let id in cells) {
                    const cell = cells[id];
                    if (cell.isVertex() || cell.isEdge()) {
                        originalStyles[id] = cell.getStyle() || "";
                    }
                }
                
                attachHighlightInteraction();
            } catch (err) {
                console.error(err);
                alert("XML 렌더링에 실패했습니다. 올바른 형식인지 확인하세요.");
            }
        }

        // 3. 자손(Downstream) 및 조상(Upstream) 노드 탐색 로직 (독자적 BFS 알고리즘 구현)
        function getConnectedCells(targetCell) {
            const model = graph.getModel();
            const downstream = new Set();
            const upstream = new Set();

            // [Phase 1] Downstream 찾기 (타겟 노드에서 나가는 방향 ─>)
            let queue = [targetCell];
            while (queue.length > 0) {
                const current = queue.shift();
                const edgeCount = model.getEdgeCount(current);
                
                for (let i = 0; i < edgeCount; i++) {
                    const edge = model.getEdgeAt(current, i);
                    const source = model.getTerminal(edge, true); // 출발지
                    const target = model.getTerminal(edge, false); // 도착지
                    
                    // 나가는 방향(source가 내 자신)일 때만 하위로 계속 파고듦
                    if (source === current && !downstream.has(edge)) {
                        downstream.add(edge);
                        if (target && !downstream.has(target)) {
                            downstream.add(target);
                            queue.push(target);
                        }
                    }
                }
            }

            // [Phase 2] Upstream 찾기 (타겟 노드로 들어오는 방향 <─)
            queue = [targetCell];
            while (queue.length > 0) {
                const current = queue.shift();
                const edgeCount = model.getEdgeCount(current);
                
                for (let i = 0; i < edgeCount; i++) {
                    const edge = model.getEdgeAt(current, i);
                    const source = model.getTerminal(edge, true);
                    const target = model.getTerminal(edge, false);
                    
                    // 들어오는 방향(target이 내 자신)일 때만 상위로 거슬러 올라감
                    if (target === current && !upstream.has(edge)) {
                        upstream.add(edge);
                        if (source && !upstream.has(source)) {
                            upstream.add(source);
                            queue.push(source);
                        }
                    }
                }
            }

            // 양방향으로 추적된 모든 경로(선+박스) 합치기
            return [...downstream, ...upstream, targetCell];
        }

        // 4. 클릭 인터랙션에 하이라이트 알고리즘 주입
        function attachHighlightInteraction() {
            graph.addListener(mxEvent.CLICK, function (sender, evt) {
                const cell = evt.getProperty('cell');
                const model = graph.getModel();
                
                model.beginUpdate();
                try {
                    // 일단 도화지의 모든 요소를 투명도 20%(opacity=20)로 강제 희미하게 만듦
                    for (let id in model.cells) {
                        const c = model.cells[id];
                        if (c.isVertex() || c.isEdge()) {
                            // 원본 스타일 텍스트 뒤에 opacity 조작 코드를 덧붙이는 방식
                            model.setStyle(c, originalStyles[id] + ";opacity=15;");
                        }
                    }

                    // 클릭한 요소가 박스(Vertex)일 경우에만 미로찾기 시작
                    if (cell && cell.isVertex()) {
                        const connectedCells = getConnectedCells(cell);
                        
                        // 알고리즘이 찾아낸 연결된 셀들만 투명도를 100%로 복원하고 강조
                        connectedCells.forEach(c => {
                            if (c.isVertex()) {
                                // 노드: 투명도 복원, 진한 파란색 테두리
                                model.setStyle(c, originalStyles[c.getId()] + ";opacity=100;strokeWidth=4;strokeColor=#1a73e8;");
                            } else if (c.isEdge()) {
                                // 선: 투명도 복원, 진한 파란색, 두께 증가
                                model.setStyle(c, originalStyles[c.getId()] + ";opacity=100;strokeWidth=4;strokeColor=#1a73e8;");
                            }
                        });
                    } 
                    // 빈 공간(바탕) 클릭 시 전체 투명도 정상화 (리셋)
                    else if (!cell) {
                        for (let id in model.cells) {
                            const c = model.cells[id];
                            if (c.isVertex() || c.isEdge()) {
                                model.setStyle(c, originalStyles[id]);
                            }
                        }
                    }
                } finally {
                    model.endUpdate(); // 화면 다시 그리기 반영
                }
                
                evt.consume(); // 브라우저 기본 클릭 동작 캔슬
            });
        }

        // 초기 시작 버튼 할당
        document.getElementById('renderBtn').addEventListener('click', () => {
            renderDrawioXML(document.getElementById('xmlInput').value);
        });

        // 로드 되자마자 샘플 렌더링
        renderDrawioXML(document.getElementById('xmlInput').value);

    </script>
