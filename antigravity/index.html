<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw.io 100% Original Viewer</title>
    
    <!-- [핵심 해결책] mxGraph가 알 수 없는 외부 CSS/XML을 추가 다운로드하다가 뻗는 에러를 사전에 차단합니다. -->
    <script type="text/javascript">
        mxLoadResources = false;
        mxLoadStylesheets = false;
        mxBasePath = 'https://cdnjs.cloudflare.com/ajax/libs/mxgraph/4.2.2/javascript/src';
    </script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mxgraph/4.2.2/javascript/mxClient.min.js"></script>

    <style>
        :root { --primary-color: #1a73e8; --panel-bg: #fff; --border-color: #dadce0; }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; background-color: #f8f9fa; overflow: hidden; }
        
        #sidebar { 
            width: 350px; background: var(--panel-bg); border-right: 1px solid var(--border-color); 
            padding: 24px; display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.05); 
        }
        h2 { font-size: 1.25rem; margin-top: 0; color: #333; }
        textarea { 
            flex-grow: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; 
            font-family: monospace; font-size: 0.85rem; outline: none; margin-bottom: 16px; 
            resize: none; white-space: pre; 
        }
        button { 
            background-color: var(--primary-color); color: white; border: none; padding: 14px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #1557b0; }
        
        #graphContainer {
            flex-grow: 1; position: relative; overflow: auto;
            background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
        }

</head>
<body>

    <div id="sidebar">
        <h2>Draw.io 공식 엔진 Viewer</h2>
        <p style="font-size:0.9rem; color:#666; line-height: 1.4;">
            오리지널 mxGraph 엔진으로 100% 똑같이 렌더링하고, 경로 하이라이트 알고리즘을 추가합니다.
        </p>
        <textarea id="xmlInput"></textarea>
        <button id="renderBtn">오리지널 렌더링</button>
    </div>

    <!-- 그래프 도화지 -->
    <div id="graphContainer"></div>

    <script>
        let graph = null;
        let originalStyles = {};

        // 1. 단 한 번만 그래프 뷰어를 초기화하는 함수
        function initGraph() {
            if (!graph) {
                const container = document.getElementById('graphContainer');
                graph = new mxGraph(container);
                
                // 뷰어 환경으로 잠금
                graph.setCellsLocked(true); 
                graph.setConnectable(false);
                graph.setTooltips(false);
                
                // 마우스 드래그로 도화지 이동 (Panning) 허용
                graph.setPanning(true); 
                const panner = new mxPanningHandler(graph);
                panner.useLeftButtonForPanning = true;

                // 클릭 이벤트는 한 번만 세팅
                attachHighlightInteraction();
            }
        }

        // 2. XML 파싱 및 렌더링
        function renderDrawioXML(xmlString) {
            initGraph();
            
            try {
                const doc = mxUtils.parseXml(xmlString);
                const codec = new mxCodec(doc);
                const model = graph.getModel();
                
                model.beginUpdate();
                try {
                    // 파괴(destroy) 대신 데이터 모델만 깔끔하게 비움
                    model.clear(); 
                    codec.decode(doc.documentElement, model);
                } finally {
                    model.endUpdate();
                }

                // 성공적으로 렌더링 된 노드와 선들의 기본 색상을 백업해둠
                originalStyles = {};
                const cells = model.cells;
                for (let id in cells) {
                    const cell = cells[id];
                    if (cell.isVertex() || cell.isEdge()) {
                        originalStyles[id] = cell.getStyle() || "";
                    }
                }
                
            } catch (err) {
                console.error(err);
                alert("XML 렌더링에 실패했습니다. 올바른 형식인지 확인하세요.");
            }
        }

        // 3. 자손 및 조상 노드 양방향 탐색 (BFS 로직)
        function getConnectedCells(targetCell) {
            const model = graph.getModel();
            const downstream = new Set();
            const upstream = new Set();

            // [Phase 1] 나가는 방향 추적
            let queue = [targetCell];
            while (queue.length > 0) {
                const current = queue.shift();
                const edgeCount = model.getEdgeCount(current);
                
                for (let i = 0; i < edgeCount; i++) {
                    const edge = model.getEdgeAt(current, i);
                    const source = model.getTerminal(edge, true); 
                    const target = model.getTerminal(edge, false); 
                    
                    if (source === current && !downstream.has(edge)) {
                        downstream.add(edge);
                        if (target && !downstream.has(target)) {
                            downstream.add(target);
                            queue.push(target);
                        }
                    }
                }
            }

            // [Phase 2] 들어오는 방향 추적
            queue = [targetCell];
            while (queue.length > 0) {
                const current = queue.shift();
                const edgeCount = model.getEdgeCount(current);
                
                for (let i = 0; i < edgeCount; i++) {
                    const edge = model.getEdgeAt(current, i);
                    const source = model.getTerminal(edge, true);
                    const target = model.getTerminal(edge, false);
                    
                    if (target === current && !upstream.has(edge)) {
                        upstream.add(edge);
                        if (source && !upstream.has(source)) {
                            upstream.add(source);
                            queue.push(source);
                        }
                    }
                }
            }

            return [...downstream, ...upstream, targetCell];
        }

        // 4. 클릭 하이라이팅
        function attachHighlightInteraction() {
            graph.addListener(mxEvent.CLICK, function (sender, evt) {
                const cell = evt.getProperty('cell');
                const model = graph.getModel();
                
                model.beginUpdate();
                try {
                    // 전체를 흐리게(Opacity 20)
                    for (let id in model.cells) {
                        const c = model.cells[id];
                        if (c.isVertex() || c.isEdge()) {
                            model.setStyle(c, originalStyles[id] + ";opacity=20;");
                        }
                    }

                    // 클릭한 노드를 기준으로 연결된 것만 진하게 복원
                    if (cell && cell.isVertex()) {
                        const connectedCells = getConnectedCells(cell);
                        
                        connectedCells.forEach(c => {
                            // 원래 스타일에 투명도 100%, 두께 추가, 진한 파란색 부여
                            model.setStyle(c, originalStyles[c.getId()] + ";opacity=100;strokeWidth=4;strokeColor=#1a73e8;");
                        });
                    } 
                    // 바탕화면 클릭 시 모두 원상태 복구
                    else if (!cell) {
                        for (let id in model.cells) {
                            const c = model.cells[id];
                            if (c.isVertex() || c.isEdge()) {
                                model.setStyle(c, originalStyles[id]);
                            }
                        }
                    }
                } finally {
                    model.endUpdate();
                }
                evt.consume();
            });
        }
