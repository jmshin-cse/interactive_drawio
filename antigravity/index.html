<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw.io Original Viewer</title>
    <!-- 오직 Cytoscape 코어 엔진만 사용합니다 (Dagre 삭제) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <style>
        :root {
            --primary-color: #1a73e8;
            --bg-color: #f8f9fa;
            --panel-bg: #ffffff;
            --border-color: #dadce0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            display: flex; height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        #sidebar {
            width: 350px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex; flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        h2 { font-size: 1.25rem; margin-top: 0; color: #202124; }
        p.desc { font-size: 0.9rem; color: #5f6368; line-height: 1.5; margin-bottom: 20px; }

        textarea {
            flex-grow: 1; resize: none;
            padding: 12px; border: 1px solid var(--border-color);
            border-radius: 8px; font-family: monospace; font-size: 0.85rem;
            outline: none; transition: border-color 0.2s;
            margin-bottom: 16px; white-space: pre;
        }

        button {
            background-color: var(--primary-color);
            color: white; border: none; padding: 14px;
            border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: background-color 0.2s;
        }
        button:hover { background-color: #1557b0; }

        #cy-container {
            flex-grow: 1; position: relative;
            background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        #cy { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Draw.io XML 원본 뷰어</h2>
        <p class="desc">도형 모양, 색상, 위치를 보존합니다.</p>
        <textarea id="xmlInput" placeholder="Draw.io XML을 붙여넣으세요..."></textarea>
        <button id="renderBtn">오리지널 렌더링</button>
    </div>

    <div id="cy-container">
        <div id="cy"></div>
    </div>

    <script>
        let cy = null;

        // ==========================================
        // 1. 커스텀 파싱: Draw.io의 색상, 좌표, 모양까지 모두 추출!
        // ==========================================
        function parseDrawioXML(xmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const cells = xmlDoc.querySelectorAll("mxCell");
            
            const elements = [];

            cells.forEach(cell => {
                const isVertex = cell.getAttribute("vertex") === "1";
                const isEdge = cell.getAttribute("edge") === "1";
                const id = cell.getAttribute("id");
                
                // 1) 텍스트 추출 (줄바꿈 <br> 태그 보존)
                let value = cell.getAttribute("value") || "";
                value = value.replace(/<br\s*\/?>/gi, '\n'); 
                value = value.replace(/<[^>]+>/g, '').trim(); 

                // 2) 속성(Style) 파싱 (예: style="rounded=1;fillColor=#dae8fc...")
                const styleStr = cell.getAttribute("style") || "";
                const styles = {};
                styleStr.split(";").forEach(s => {
                    const parts = s.split("=");
                    if (parts.length === 2) styles[parts[0]] = parts[1];
                    else if (parts[0]) styles[parts[0]] = true; 
                });

                // 3) 기하학 정보(크기, 위치) 파싱
                const geoNode = cell.querySelector("mxGeometry");
                let geo = { x: 0, y: 0, w: 120, h: 60 };
                if (geoNode) {
                    geo.x = parseFloat(geoNode.getAttribute("x")) || 0;
                    geo.y = parseFloat(geoNode.getAttribute("y")) || 0;
                    geo.w = parseFloat(geoNode.getAttribute("width")) || 120;
                    geo.h = parseFloat(geoNode.getAttribute("height")) || 60;
                }

                if (isVertex) {
                    // Draw.io 도형 -> 웹 그래픽 도형으로 1:1 맵핑
                    let cyShape = 'rectangle';
                    if (styles['ellipse']) cyShape = 'ellipse';
                    else if (styles['rhombus']) cyShape = 'diamond';
                    else if (styles['hexagon']) cyShape = 'hexagon';
                    else if (styles['shape'] === 'cylinder') cyShape = 'barrel';
                    else if (styles['rounded'] === '1' || styles['rounded'] === true) cyShape = 'round-rectangle';

                    // 기본 테마 색상 맵핑
                    const bgColor = styles['fillColor'] === 'none' ? 'transparent' : (styles['fillColor'] || '#ffffff');
                    const borderColor = styles['strokeColor'] === 'none' ? 'transparent' : (styles['strokeColor'] || '#000000');
                    const fontColor = styles['fontColor'] || '#000000';
                    const borderWidth = styles['strokeWidth'] ? parseFloat(styles['strokeWidth']) : 1;

                    elements.push({
                        data: { 
                            id: id, 
                            label: value,
                            bg: bgColor,
                            border: borderColor,
                            borderW: borderWidth,
                            fontColor: fontColor,
                            w: geo.w,
                            h: geo.h,
                            shape: cyShape
                        },
                        // Draw.io는 좌상단이 기준점, Cytoscape 중앙이 기준점이므로 보정 계산
                        position: { x: geo.x + (geo.w / 2), y: geo.y + (geo.h / 2) }
                    });
                } else if (isEdge) {
                    const source = cell.getAttribute("source");
                    const target = cell.getAttribute("target");
                    
                    if (source && target) {
                        // 꺾은선인지 직선인지 판별
                        let curveStyle = 'bezier';
                        if (styles['edgeStyle'] === 'orthogonalEdgeStyle' || styles['edgeStyle'] === 'elbowEdgeStyle') {
                            curveStyle = 'taxi';
                        }
                        
                        const lineColor = styles['strokeColor'] === 'none' ? 'transparent' : (styles['strokeColor'] || '#000000');
                        const width = styles['strokeWidth'] ? parseFloat(styles['strokeWidth']) : 1;

                        elements.push({
                            data: { 
                                id: id, 
                                source: source, 
                                target: target,
                                lineColor: lineColor,
                                width: width,
                                curveStyle: curveStyle
                            }
                        });
                    }
                }
            });

            return elements;
        }

        // ==========================================
        // 2. 렌더링 함수
        // ==========================================
        function renderDiagram(elements) {
            if (cy) cy.destroy();

            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                
                // data() 함수를 이용해 파싱된 원본 값을 그대로 스타일에 꽂아넣음
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'background-color': 'data(bg)',
                            'border-width': 'data(borderW)',
                            'border-color': 'data(border)',
                            'color': 'data(fontColor)',
                            'shape': 'data(shape)',
                            'width': 'data(w)',
                            'height': 'data(h)',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'text-wrap': 'wrap',
                            'font-size': '14px',
                            'transition-property': 'border-color, border-width, opacity',
                            'transition-duration': '0.3s'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 'data(width)',
                            'line-color': 'data(lineColor)',
                            'target-arrow-color': 'data(lineColor)',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'data(curveStyle)',
                            'taxi-direction': 'auto',
                            'transition-property': 'line-color, target-arrow-color, width, opacity',
                            'transition-duration': '0.3s'
                        }
                    },
                    // [하이라이팅 효과] 오리지널 색상을 유지하며 눈에 띄게 두꺼운 빨간 테두리 적용
                    {
                        selector: 'node.highlighted',
                        style: {
                            'border-color': '#ff0055',
                            'border-width': 4,
                            'z-index': 10
                        }
                    },
                    {
                        selector: 'edge.highlighted',
                        style: {
                            'line-color': '#ff0055',
                            'target-arrow-color': '#ff0055',
                            'width': 4,
                            'z-index': 10
                        }
                    },
                    {
                        selector: '.dimmed',
                        style: { opacity: 0.15 }
                    }
                ],
                // [가장 중요] 자동정렬 강제 배치(Dagre)를 끄고 읽어들인 절대 좌표(Preset)를 있는 그대로 렌더링!
                layout: {
                    name: 'preset',
                    fit: true,
                    padding: 40
                }
            });

            // ==========================================
            // 3. 하이라이팅 인터랙션 로직
            // ==========================================
            cy.on('tap', 'node', function(evt) {
                const node = evt.target;
                cy.elements().removeClass('highlighted').addClass('dimmed');
                const connectedPath = node.union(node.predecessors()).union(node.successors());
                connectedPath.removeClass('dimmed').addClass('highlighted');
            });

            cy.on('tap', function(evt) {
                if (evt.target === cy) {
                    cy.elements().removeClass('highlighted dimmed');
                }
            });
        }

        // 텍스트 영역 이벤트 리스너
        document.getElementById('renderBtn').addEventListener('click', () => {
            const rawXml = document.getElementById('xmlInput').value;
            try {
                const parsedElements = parseDrawioXML(rawXml);
                if(parsedElements.length === 0) {
                    alert('노드나 엣지를 찾을 수 없습니다.'); return;
                }
                renderDiagram(parsedElements);
            } catch (error) {
                alert('잘못된 XML 형식이거나 파싱 중 오류가 발생했습니다.');
                console.error(error);
            }
        });
    </script>
</body>
</html>
